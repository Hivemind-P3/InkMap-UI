<aside class="app-sidebar" [class.app-sidebar--collapsed]="sidebar.isCollapsed()">
    <div class="btn-menu">
      <button class="btn-open-collapse" (click)="sidebar.toggle()">
        <i [ngClass]="sidebar.isCollapsed() ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-left'"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Workspace</span>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-table-cells-large"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item nav-item--active" routerLink="/app/projects">
        <i class="fa-solid fa-layer-group"></i>
        <span>Projects</span>
      </div>

      <span class="nav-section-label">Story</span>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-person"></i>
        <span>Characters</span>
      </div>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-earth-americas"></i>
        <span>Worldbuilding</span>
      </div>
      <div class="nav-item nav-item--disabled">
        <i class="fa-regular fa-map"></i>
        <span>Maps</span>
      </div>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-diagram-project"></i>
        <span>Narrative Maps</span>
      </div>

      <span class="nav-section-label">Tools</span>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-pen"></i>
        <span>Editor</span>
      </div>
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>AI Tools</span>
      </div>

      <span class="nav-section-label">Team</span>
      <div class="nav-item nav-item--disabled">
        <i class="fa-regular fa-handshake"></i>
        <span>Collaboration</span>
      </div>
      <div class="nav-item nav-item--disabled">
        <i class="fa-regular fa-bell"></i>
        <span>Notifications</span>
      </div>

      @if (user?.role == 'ADMIN') {
        <span class="nav-section-label">Admin</span>
        <div class="nav-item nav-item--disabled" routerLink="/admin">
          <i class="fa-solid fa-user-gear"></i>
          <span>Users</span>
        </div>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="nav-item nav-item--disabled">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </div>
      <div class="sidebar-user">
        @if (user?.name) {
          <a routerLink="/app/profile" class="sidebar-user-name">{{ user?.name }}</a>
        }
        <button class="sidebar-logout" type="button" (click)="logout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Sign out</span>
        </button>
      </div>
    </div>
  </aside>
