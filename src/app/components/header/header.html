<header class="projects-header justify-content-around">
    <div class="projects-brand" routerLink="/">
      <span class="brand-dot"></span>InkMap
    </div>
    <div class="d-flex flex-row gap-3">
      <a class="nav-link" href="/#features">Features</a>
      <a class="nav-link" href="/#how-it-works">How it works</a>
      <a class="nav-link" href="/#pricing">Pricing</a>
    </div>
    <div class="header-actions">
      @if (user) {
        <span class="user-name"><a routerLink="/app/profile" class="user-name">{{ user.name }}</a></span>
        <a routerLink="/app/profile">
          <div class="profile-icon d-flex justify-content-center align-items-center">
            <i class="fa-regular fa-user"></i>
          </div>
        </a>
      } @else {
        <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
          <a routerLink="/login" class="nav-link">Sign in</a>
          <a routerLink="/register" class="btn btn-inkmap btn-sm">Get started</a>
        </div>
      }
    </div>
</header>
