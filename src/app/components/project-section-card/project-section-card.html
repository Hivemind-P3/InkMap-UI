<div class="card-wrapper h-100 w-100 card" [routerLink]="route">
    <div class="img w-100 h-100">
        <img class="card-image" [src]="image">
    </div>
    <div class="p-4 d-flex flex-column justify-content-between gap-2">
        <div class="d-flex flex-row justify-content-start gap-3">
            <div class="icon-wrapper p-2 d-flex justify-content-center align-items-center">
                <i [ngClass]="icon"></i>
            </div>
            <div class="d-flex flex-column justify-content-between gap-1">
                <span class="header2 d-flex align-items-center default-header">{{title}}</span>
                <span>{{description}}</span>
            </div>
        </div>
    </div>
</div>
