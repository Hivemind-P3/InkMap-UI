<div class="google-page">
  <div class="google-card">

    <!-- Header -->
    <div class="google-header">
      <!-- Google logo -->
      <svg class="google-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-label="Google">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      <h1 class="google-title">Sign in with Google</h1>
      <p class="google-subtitle">
        to continue to <strong class="app-name">InkMap</strong>
      </p>
    </div>

    <!-- Accounts list -->
    <div class="accounts-list">
      <p class="accounts-hint">Choose an account</p>

      @for (account of accounts; track account.email) {
        <button
          class="account-row"
          [class.account-row--selected]="selectedAccount?.email === account.email"
          type="button"
          (click)="selectAccount(account)"
        >
          <div class="account-avatar" [style.background]="account.color">
            {{ account.initials }}
          </div>
          <div class="account-info">
            <span class="account-name">{{ account.name }}</span>
            <span class="account-email">{{ account.email }}</span>
          </div>
          <svg class="account-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }

      <!-- Use another account -->
      <button class="account-row account-row--other" type="button">
        <div class="account-avatar account-avatar--outline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="account-info">
          <span class="account-name">Use another account</span>
        </div>
        <svg class="account-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Info text -->
    <p class="google-info-text">
      To continue, Google will share your name, email address, and profile picture with InkMap.
    </p>

    <!-- Back link -->
    <div class="google-back">
      <a routerLink="/login" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to sign in
      </a>
    </div>

    <!-- Footer -->
    <div class="google-footer">
      <a href="#" class="footer-link">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link">Terms of Service</a>
    </div>

  </div>
</div>
