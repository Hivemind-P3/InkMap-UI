<div class="container">

  <h2>Reset password</h2>

  <p>Enter your email address to receive a link.</p>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <button (click)="submit()" [disabled]="loading">
    Send
  </button>

  <p class="message">{{ message }}</p>

</div>
