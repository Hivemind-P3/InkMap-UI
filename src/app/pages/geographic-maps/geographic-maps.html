<div class="page-wrapper">
    <div class="d-flex justify-content-center">
        @if (isLoading) {
            <div class="mt-5 d-flex justify-content-center align-items-center h-100">
                <div class="spinner-border text-secondary" role="status"></div>
            </div>
        } @else {
            <div class="p-5 d-flex flex-column content-wrapper w-100 gap-3">
                <div>
                    <button class="btn-accent2" (click)="goBack()"><i class="fa-solid fa-angle-left"></i> Go back</button>
                </div>
                <div class="d-flex flex-row justify-content-between">
                    <span class="header1 default-header">Maps</span>
                    <button class="btn-accent2" (click)="redirect()">Create map</button>
                </div>
                <div class="search-bar">
                    <input
                    class="search-input"
                    name="search"
                    type="text"
                    placeholder="Search by name..."
                    autocomplete="off"
                    />
                    <button class="btn-search" type="button">Search</button>
                </div>
                @if (!maps.length) {
                    <div class="empty-content">
                        <div class="empty-icon" aria-hidden="true">
                            <div class="empty-icon-circle">
                                <i class="fa-regular fa-map"></i>
                            </div>
                        </div>
                        <p class="empty-content-title">No maps registered</p>
                        <p class="empty-content-subtitle">This project does not have maps</p>
                    </div>
                } @else {
                    <div class="grid-area">
                        <div class="maps-grid">
                            @for (map of maps; track map.id) {
                                <div class="map-card" (click)="openMap(map.id)">
                                    @if (map.thumbnail) {
                                        <img [src]="map.thumbnail" class="map-thumbnail" alt="Map preview">
                                    } @else {
                                        <div class="map-thumbnail-placeholder">
                                            <i class="fa-regular fa-map"></i>
                                        </div>
                                    }
                                    <div class="card-top">
                                        <h2 class="card-title">{{ map.name }}</h2>
                                        <span class="card-role">Map</span>
                                    </div>
                                    <div class="card-footer">
                                        @if (map.createdAt) {
                                            <span class="card-date">{{ map.createdAt | date: 'mediumDate' }}</span>
                                        } @else {
                                            <span></span>
                                        }
                                        <div class="card-actions">
                                            <button class="btn-detail" type="button" (click)="openMap(map.id); $event.stopPropagation()">
                                                Open
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            }
                        </div>
                    </div>
                }
            </div>
            }
    </div>
</div>
