<div class="page-wrapper">
    <div class="d-flex justify-content-center">
        @if (isLoading) {
            <div class="mt-5 d-flex justify-content-center align-items-center h-100">
                <div class="spinner-border text-secondary" role="status"></div>
            </div>
        } @else if (wiki) {
            <div class="p-5 d-flex flex-column content-wrapper w-100 gap-3">
                <div>
                    <button class="btn-accent2" (click)="goBack()"><i class="fa-solid fa-angle-left"></i> Go back</button>
                </div>
                <div class="wiki-header">
                    <div class="wiki-icon">
                        <i class="fa-regular fa-file-lines"></i>
                    </div>
                    <div>
                        <h1 class="wiki-title default-header">{{ wiki.title }}</h1>
                        <span class="wiki-slug">{{ wiki.slug }}</span>
                    </div>
                </div>
                <hr class="section-divider">
                @if (wiki.content) {
                    <div class="wiki-content">{{ wiki.content }}</div>
                } @else {
                    <div class="wiki-empty-content">
                        <i class="fa-regular fa-file-lines"></i>
                        <span>This wiki has no content yet.</span>
                    </div>
                }
            </div>
        }
    </div>
</div>
